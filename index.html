<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utilitarios.js"></script>
</head>

<body onload="iniciarJuego()">

  <div class="game-ui">

    <header class="top-bar">
      <h1>🎯 CAZANDO AL RATON</h1>
      <p class="autor">by Daniel Anguisaca</p>
    </header>

    <div class="hud">
      <div class="stat">
        ⭐ <span>Puntos</span>
        <strong id="puntos">0</strong>
      </div>
      <div class="stat">
        ⏱ <span>Tiempo</span>
        <strong id="tiempo">15</strong>
      </div>
    </div>

    <div class="game-container">
      <canvas id="areaJuego" width="500" height="500"></canvas>

      <div class="overlay">
        <p id="mensaje"></p>
      </div>
    </div>

    <div class="controls">
      <button onclick="moverArriba()">⬆</button>
      <div class="middle">
        <button onclick="moverIzquierda()">⬅</button>
        <button onclick="moverAbajo()">⬇</button>
        <button onclick="moverDerecha()">➡</button>
      </div>
    </div>

    <button class="btn-restart" onclick="reiniciar()">🔄 REINICIAR</button>

  </div>

  <script src="cazando.js"></script>

</body>
</html>
